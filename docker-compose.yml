version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eduflow_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: eduflow_dev
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:J5XxKp9QnVZ3yQmNLx7Vh8Fv9LqYzT2a3xGc5P8B6kA=
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - ./backend/database:/var/www/html/database
      - ./backend/public:/var/www/html/public
      - ./backend/resources:/var/www/html/resources
      - ./backend/storage:/var/www/html/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data: